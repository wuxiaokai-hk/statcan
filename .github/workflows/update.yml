name: Update StatCan Table 18-10-0255-01

on:
  schedule:
    - cron: "0 3 1 * *" # 03:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Python dependencies and model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
            ~/.cache/torch
            ~/.cache/chronos
          key: ${{ runner.os }}-statcan-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-statcan-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: python update.py

      # contents: write allows pushing README.md, dashboard.png, and data/ back to the repo (e.g. main)
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "Refresh CRSPI data, AI forecasts, and Real-Time Commercial Rent Intelligence [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

